app = 'x402-api'
primary_region = 'nrt'  # Tokyo

[build]

[env]
  NODE_ENV = 'production'
  PORT = '4020'

[http_service]
  internal_port = 4020
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

[[http_service.checks]]
  grace_period = '5s'
  interval = '30s'
  method = 'GET'
  path = '/health'
  timeout = '3s'

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
